<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班級訂餐系統</title>
    <style>
        body { font-family: 'Microsoft JHei', sans-serif; background: #f0f4f8; text-align: center; padding: 20px; }
        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; max-width: 500px; margin: 20px auto; }
        .meal-btn { background: #fff; border: 2px solid #ddd; padding: 15px; border-radius: 10px; cursor: pointer; }
        .selected { background: #ffe0b2; border-color: #ff9800; font-weight: bold; }
        input { width: 80%; padding: 12px; margin: 10px; border: 1px solid #ccc; border-radius: 8px; }
        button.submit { width: 85%; padding: 12px; background: #ff9800; border: none; border-radius: 8px; color: white; font-size: 18px; cursor: pointer; }
        .order-list { max-width: 500px; margin: 30px auto; text-align: left; background: #fff; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .order-item { padding: 8px 0; border-bottom: 1px solid #eee; }
        .status { color: red; font-size: 14px; margin: 10px 0; }
        .date-toolbar { display: flex; align-items: center; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .date-btn { padding: 8px 12px; border: none; border-radius: 8px; background: #607d8b; color: #fff; cursor: pointer; }
        #orderDate { width: auto; min-width: 180px; }
    </style>
    <!-- 🔥 引入 Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>
    <h2>📋 今日班級訂餐</h2>
    <div class="date-toolbar">
        <button class="date-btn" id="prevDateBtn" type="button">前一天</button>
        <input type="date" id="orderDate">
        <button class="date-btn" id="nextDateBtn" type="button">後一天</button>
    </div>
    <div class="menu-grid" id="menuContainer"></div>
    <input type="text" id="userName" placeholder="輸入您的姓名">
    <button class="submit" id="submitBtn" onclick="submitOrder()">📝 送出訂餐</button>
    <div class="status" id="statusMsg"></div>
    
    <div class="order-list">
        <h3 id="orderTitle">📊 今日已訂購名單</h3>
        <div id="statsContainer"></div>
        <div id="listContainer"></div>
    </div>

    <script>
               const firebaseConfig = {
            apiKey: "AIzaSyDJt_jNEHxKUopvcXUiJTYsyca14seNr_g",
            authDomain: "class-meal-order.firebaseapp.com",
            databaseURL: "https://class-meal-order-default-rtdb.firebaseio.com",
            projectId: "class-meal-order",
            storageBucket: "class-meal-order.firebasestorage.app",
            messagingSenderId: "36437368377",
            appId: "1:36437368377:web:2c9ddb1fe1c3b48febb7e8"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let selectedMeal = null;
        let currentOrdersRef = null;

        function getLocalDateKey(dateObj) {
            const year = dateObj.getFullYear();
            const month = String(dateObj.getMonth() + 1).padStart(2, '0');
            const day = String(dateObj.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function formatDateLabel(dateKey) {
            const parts = dateKey.split('-');
            return `${Number(parts[1])}月${Number(parts[2])}號`;
        }

        let selectedDateKey = getLocalDateKey(new Date());

        // 菜單設定
        const menuData = [
  { name: '保鮮雞丁便當', price: 80 },
  { name: '糖醋雞丁便當', price: 80 },
  { name: '獅子頭便當', price: 80 },
  { name: '合菜便當', price: 80 },
  { name: '瓜仔肉便當', price: 80 },
  { name: '方便素便當', price: 80 },
  { name: '三杯雞便當', price: 80 },
  { name: '香雞排便當', price: 80 },
  { name: '煎排骨便當', price: 80 },
  { name: '炸雞腿便當', price: 80 },
  { name: '滷雞腿便當', price: 80 },
  { name: '去骨雞腿便當', price: 80 },
  { name: '牛肉便當', price: 90 },
  { name: '鮮魚便當', price: 100 },
    { name: '會議便當', price: 100 }
];

        // 渲染菜單
        menuData.forEach(meal => {
            const btn = document.createElement('div');
            btn.className = 'meal-btn';
            btn.innerText = `${meal.name}\n(${meal.price}元)`;
            btn.onclick = () => {
                document.querySelectorAll('.meal-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedMeal = meal;
                document.getElementById('submitBtn').disabled = false;
            };
            document.getElementById('menuContainer').appendChild(btn);
        });

        // 送出訂餐
        function submitOrder() {
            const name = document.getElementById('userName').value.trim();
            if(!name) { alert('請輸入姓名！'); return; }
            if(!selectedMeal) { alert('請選擇餐點！'); return; }
            
            const btn = document.getElementById('submitBtn');
            btn.innerText = '送出中...';
            
            const orderData = { name: name, meal: selectedMeal.name, price: selectedMeal.price, time: new Date().toLocaleTimeString() };

            // 存入 Firebase
            db.ref('orders/' + selectedDateKey).push(orderData).then(() => {
                alert(`${name} 訂購成功！`);
                document.getElementById('userName').value = '';
                btn.innerText = '送出訂餐';
                document.querySelectorAll('.meal-btn').forEach(b => b.classList.remove('selected'));
                selectedMeal = null;
            }).catch(err => { alert('失敗：'+err); btn.innerText = '送出訂餐'; });
        }

        function refreshDateView() {
            document.querySelector('h2').innerText = `📋 ${formatDateLabel(selectedDateKey)}班級訂餐`;
            document.getElementById('orderTitle').innerText = `📊 ${formatDateLabel(selectedDateKey)}已訂購名單`;
            document.getElementById('orderDate').value = selectedDateKey;
        }

        function watchOrdersByDate() {
            if (currentOrdersRef) currentOrdersRef.off();
            currentOrdersRef = db.ref('orders/' + selectedDateKey);

            // 即時監聽資料變化 (不需要重新整理網頁就會自己更新)
            currentOrdersRef.on('value', snapshot => {
            const listDiv = document.getElementById('listContainer');
            const statsDiv = document.getElementById('statsContainer');
            listDiv.innerHTML = '';
            statsDiv.innerHTML = '';

            if(!snapshot.exists()) {
                listDiv.innerHTML = `<div style="color:#999;">${formatDateLabel(selectedDateKey)}還沒有人訂餐喔</div>`;
                return;
            }

            let orders = [];
            let stats = {};
            snapshot.forEach(child => {
                const data = child.val();
                orders.push(data);
                stats[data.meal] = (stats[data.meal] || 0) + 1;
            });

            // 顯示統計
            let statsHtml = '';
            for (let m in stats) statsHtml += `<span style="margin:0 10px;">🍱 ${m}: ${stats[m]}份</span>`;
            statsDiv.innerHTML = statsHtml;

            // 顯示名單
            orders.reverse().forEach(item => {
                const div = document.createElement('div');
                div.className = 'order-item';
                div.innerText = `${item.name} - ${item.meal} (${item.price}元) [${item.time}]`;
                listDiv.appendChild(div);
            });
            });
        }

        function shiftDate(days) {
            const dateObj = new Date(selectedDateKey + 'T00:00:00');
            dateObj.setDate(dateObj.getDate() + days);
            selectedDateKey = getLocalDateKey(dateObj);
            refreshDateView();
            watchOrdersByDate();
        }

        document.getElementById('orderDate').addEventListener('change', function() {
            if (!this.value) return;
            selectedDateKey = this.value;
            refreshDateView();
            watchOrdersByDate();
        });

        document.getElementById('prevDateBtn').addEventListener('click', () => shiftDate(-1));
        document.getElementById('nextDateBtn').addEventListener('click', () => shiftDate(1));

        refreshDateView();
        watchOrdersByDate();
    </script>
</body>
</html>
